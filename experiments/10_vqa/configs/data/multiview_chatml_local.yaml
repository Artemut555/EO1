# Multiview QA, ChatML format, local images
# Source: qa-multiview_qa from YTSaurus (raw ChatML, converted on load)
# Download: python experiments/10_vqa/scripts/download_multiview.py --format chatml
mm_datasets:
  - json_path: experiments/10_vqa/data/qa-multiview_qa/jsonl/qa-multiview_qa_chatml.jsonl
    format: chatml
    vision_base_path: experiments/10_vqa/data/qa-multiview_qa/images
    vision_backend: local
    sampling_strategy: all
