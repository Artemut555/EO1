# Multiview correspondence QA, LLaVA format, local images
# Source: converted from ChatML via convert_chatml_to_eo.py
# Each sample has 2 images (stereo pair) + point-matching Q&A.
mm_datasets:
  - json_path: ../../../extra/eo/data/multiview/jsonl/multiview_chatml.jsonl
    vision_base_path: ../../../extra/eo/data/multiview/images
    sampling_strategy: first:200
