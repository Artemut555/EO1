# Multiview ChatML training data config (local images)
# Dataset: multiview correspondence QA from YTSaurus
#
# For local debug: images are downloaded from S3 to disk.
# Run convert_chatml_to_eo.py with --download-images first:
#   python experiments/10_vqa/convert_chatml_to_eo.py --download-images --limit 200
#
# Image paths in the JSONL are S3 keys like:
#   visiondata/robotics/gregorykogan/eo-data/multiview_images/0028-0000/xxx.png
# The vision_base_path is the root of the local images directory,
# and the S3 key structure is mirrored locally.

mm_datasets:
  - json_path: ../../data_multiview_chatml/jsonl/multiview_chatml.jsonl
    vision_base_path: ../../data_multiview_chatml/images
    sampling_strategy: first:200
