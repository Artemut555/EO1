# qa-multiview_qa from YTSaurus, ChatML format, local images
# For local testing. Run first (from EO1 repo root):
#   python experiments/10_vqa/download_qa_multiview_local.py
#
# Dataset: //home/visiondata/users/gregorykogan/eo-data/chatml/qa-multiview_qa
# Format: chatml (dialogue + image_paths); converted to LLaVA-style internally.
# Paths are relative to EO1 repo root.

mm_datasets:
  - json_path: experiments/10_vqa/data/qa-multiview_qa/jsonl/qa-multiview_qa_chatml.jsonl
    format: chatml
    vision_base_path: experiments/10_vqa/data/qa-multiview_qa/images
    vision_backend: local
    sampling_strategy: all
