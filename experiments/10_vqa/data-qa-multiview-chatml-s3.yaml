# qa-multiview_qa ChatML format, images from S3
# Use when you have a ChatML JSONL (e.g. from YT dump) and images are in S3.
# Image paths in the JSONL are S3 keys; no vision_base_path needed.
#
# To produce the JSONL from YTSaurus:
#   python experiments/10_vqa/convert_chatml_to_eo.py --output-dir /path/to/dump
#   (or use download_qa_multiview_local.py without --no-download-images to get ChatML jsonl only)

mm_datasets:
  - json_path: /home/jovyan/zavarza/projects/extra/eo/data/qa_multiview_chatml/jsonl/qa-multiview_qa_chatml.jsonl
    format: chatml
    vision_backend: s3
    s3_bucket: gigaeye-data
    sampling_strategy: random:100%
