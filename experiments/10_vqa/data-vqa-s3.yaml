# Robotics VQA - images from S3 (for profiling S3 overhead)
# JSONL is local; images are loaded from s3://gigaeye-data/visiondata/users/avzavarzin/data_vqa_robot/images/
# Run upload_data_vqa_to_s3.py first to upload the sample.

mm_datasets:
  - json_path: ../../data_vqa_robot/jsonl/all_robot_vqa_sample.jsonl
    vision_base_path: visiondata/users/avzavarzin/data_vqa_robot/images
    vision_backend: s3
    s3_bucket: gigaeye-data
    s3_prefix: visiondata/users/avzavarzin
    sampling_strategy: random:100%
