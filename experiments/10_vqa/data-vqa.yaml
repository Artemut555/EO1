# Robotics VQA fine-tuning data config
# For data under EXTRA_EO (~/projects/extra/eo), use the parent repo's script:
#   python eo_experiment/scripts/write_data_yaml.py -o eo_experiment/config/data-vqa-extra.yaml
# Then run train with: --data-path ../../config/data-vqa-extra.yaml
#
# This file uses relative paths for when data lives at qwen_tune/data_vqa_robot (legacy).

mm_datasets:
  - json_path: ../../data_vqa_robot/jsonl/all_robot_vqa.jsonl
    vision_base_path: ../../data_vqa_robot/images
    sampling_strategy: random:100%
